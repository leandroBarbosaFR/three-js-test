<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Ripple — Home</title>
    <link rel="stylesheet" href="/styles.css" />

    <!-- Import map lets us use bare imports straight from a CDN, no build step -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
          "@barba/core": "https://esm.sh/@barba/core@2.10.3"
        }
      }
    </script>
  </head>
  <body>
    <!-- Persistent: canvas + nav live OUTSIDE the Barba container so they
         survive page transitions and never reload. -->
    <canvas id="app"></canvas>
    <nav class="nav">
      <a href="/index.html">Home</a>
      <a href="/about.html">About</a>
    </nav>

    <div data-barba="wrapper">
      <main data-barba="container" data-barba-namespace="home"></main>
    </div>

    <script type="module" src="/main.js"></script>
    <script type="module" src="/transitions.js"></script>
  </body>
</html>

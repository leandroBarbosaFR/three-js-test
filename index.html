<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Ripple — Home</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Import map lets us use bare imports straight from a CDN, no build step -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
          "@barba/core": "https://esm.sh/@barba/core@2.10.3"
        }
      }
    </script>
  </head>
  <body>
    <!-- Persistent: video canvas + nav + footer live OUTSIDE the Barba
         container so they survive page transitions. -->
    <canvas id="app"></canvas>
    <nav class="nav">
      <a href="/index.html">Home</a>
      <a href="/about.html">About</a>
    </nav>

    <div data-barba="wrapper">
      <main data-barba="container" data-barba-namespace="home">
        <!-- Tall transparent spacer: the pinned video scrubs while you
             scroll through it, then the footer scrolls up over it. -->
        <div class="hero"></div>
      </main>
    </div>

    <!-- Persistent site footer -->
    <footer class="footer">
      <div class="footer-grid">
        <div class="brand">
          <h2>Let's design<br />what's next.</h2>
          <a class="contact-btn" href="/about.html">CONTACT US</a>
        </div>

        <nav class="footer-links">
          <a href="/index.html">Projects</a>
          <a href="/about.html">About us</a>
          <a href="/index.html">Privacy Policy</a>
          <a href="/index.html">Legal Notice</a>
          <a href="/about.html">Get in touch</a>
        </nav>

        <div class="footer-contacts">
          <div class="contact">
            <b>Marseille, France</b>
            <span>+33 07 63 85 83 88</span>
          </div>
          <div class="contact">
            <b>London, UK</b>
            <span>+33 07 63 85 83 88</span>
          </div>
          <div class="contact">
            <b>Florianópolis, Brazil</b>
            <span>+55 48 99195-8826</span>
            <span>SC-405, 4397 - Campeche,</span>
            <span>Florianópolis - SC, 88065-000</span>
            <span>OKA SHOPPING</span>
          </div>
        </div>
      </div>

      <canvas id="footer-glass"></canvas>
    </footer>

    <script type="module" src="/main.js"></script>
    <script type="module" src="/transitions.js"></script>
  </body>
</html>
